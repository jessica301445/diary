<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>手帳日記 - 完美修正版</title>

  <!-- jsPDF（保留加密） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- 明確載入 html2canvas（iPhone Safari 穩定用） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- 保留（不影響；本版匯出不依賴 wrapper） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* 核心基礎樣式 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f5f7fa; }

    body {
      font-family: Georgia, "Microsoft JhengHei", serif;
      color: #5D4037;
      display: flex; justify-content: center; align-items: center;
    }

    .book-container {
      perspective: 1200px;
      width: 900px; height: 650px;
      position: relative;
    }

    .book {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      background: #8B4513;
      border-radius: 20px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5);
    }

    /* 關鍵：修正格線對齊 */
    .page {
      position: absolute; width: 50%; height: 100%;
      padding: 50px 30px 130px 30px;
      background: white; overflow-y: auto;
      line-height: 24px;
      font-size: 16px;
      background-image: repeating-linear-gradient(0deg, #f0f0f0 0px, #f0f0f0 1px, transparent 1px, transparent 24px);
      background-attachment: local;
      box-shadow: inset 5px 0 10px rgba(0,0,0,0.1);
      word-wrap: break-word;
    }

    .page.left { left: 0; border-radius: 20px 0 0 20px; }
    .page.right { right: 0; border-radius: 0 20px 20px 0; }
    .page.cover { background: #8B4513; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; }

    .page img { max-width: 100%; border-radius: 8px; margin-top: 10px; }
    .page-header { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-bottom: 5px; color: #777; }

    /* 核心：翻頁動畫層 */
    .flip-sheet {
      position: absolute; width: 50%; height: 100%;
      right: 0; top: 0;
      transform-style: preserve-3d;
      transform-origin: left center;
      transition: transform 0.8s cubic-bezier(0.4, 0.0, 0.2, 1);
      display: none;
      z-index: 5000;
    }
    .flip-sheet.turn { transform: rotateY(-180deg); }

    .flip-face {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden;
      padding: 50px 30px 130px 30px;
      background: white; overflow-y: auto;
      line-height: 24px; font-size: 16px;
      background-image: repeating-linear-gradient(0deg, #f0f0f0 0px, #f0f0f0 1px, transparent 1px, transparent 24px);
      background-attachment: local;
      box-shadow: inset 5px 0 10px rgba(0,0,0,0.1);
      word-wrap: break-word;
    }

    #flipFront { border-radius: 0 20px 20px 0; }
    #flipBack { transform: rotateY(180deg); border-radius: 0 20px 20px 0; }

    .controls {
      position: fixed;
      display: flex;
      align-items: center;
      gap: 8px;
      bottom: 0; width: 100%; border-radius: 0; justify-content: space-around; padding: 10px 5px; height: 80px;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
    }

    .controls button {
      background: #8B4513; color: white; border: none; border-radius: 50px;
      padding: 12px 18px; font-size: 14px; cursor: pointer;
      font-weight: bold; font-family: Georgia, "Microsoft JhengHei", serif;
      transition: background 0.2s;
      padding: 8px 5px; font-size: 12px; flex: 1; max-width: 70px;
    }
    .controls button:hover { background: #6D3611; }

    .entry-actions { position: absolute; top: 55px; right: 35px; display: flex; gap: 5px; }
    .entry-actions button { padding: 3px 8px; font-size: 11px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; }
    .entry-actions button.delete { color: #e53935; border-color: #e53935; }

    .entry-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 6000; justify-content: center; align-items: center; }
    .modal-content { background: white; border-radius: 20px; padding: 30px; max-width: 500px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .modal-content h3 { margin-bottom: 15px; color: #5D4037; }
    .modal-content textarea { width: 100%; height: 180px; padding: 15px; margin-top: 10px; border-radius: 10px; border: 1px solid #ddd; font-family: Georgia, "Microsoft JhengHei", serif; resize: vertical; font-size: 14px; line-height: 24px; }

    .mood-selector { display: flex; gap: 10px; margin: 10px 0; justify-content: center; }
    .mood-icon { font-size: 28px; cursor: pointer; opacity: 0.4; transition: all 0.2s; }
    .mood-icon:hover, .mood-icon.selected { opacity: 1; transform: scale(1.3); }

    #privacy-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: white; display: none; z-index: 9999; justify-content: center; align-items: center; flex-direction: column; font-size: 18px; }

    /* 全部刪除確認視窗樣式 */
    .delete-modal-content {
      background: white;
      border-radius: 20px;
      padding: 30px 25px;
      max-width: 340px;
      width: 90%;
      text-align: center;
    }
    .delete-modal-content h3 {
      color: #5D4037;
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 25px;
    }
    .delete-modal-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .delete-modal-btns button {
      flex: 1;
      padding: 12px 8px;
      border-radius: 20px;
      border: none;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      font-family: Georgia, "Microsoft JhengHei", serif;
    }
    .btn-cancel-delete { background: #e0e0e0; color: #555; }
    .btn-confirm-delete { background: #e53935; color: white; }

    @media (max-width: 768px) {
      .book-container { width: 95vw; height: 70vh; }
      .page { width: 100%; padding: 40px 25px 100px 25px; }
      .page.left { border-radius: 20px; }
      .page.right { display: none; }
      .flip-sheet { width: 100%; }
      .flip-face { padding: 40px 25px 100px 25px; }
      #flipFront, #flipBack { border-radius: 20px; }
      .controls { gap: 5px; }
      .controls button { padding: 8px 5px; font-size: 12px; flex: 1; max-width: 70px; }
    }
  </style>
</head>
<body>

  <div class="book-container">
    <div class="book" id="book">
      <div class="page left" id="leftPage"></div>
      <div class="page right" id="rightPage"></div>
      <div id="flipSheet" class="flip-sheet">
        <div id="flipFront" class="flip-face"></div>
        <div id="flipBack" class="flip-face"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="prevPage()">⬅️</button>
    <span id="pageCounter" style="font-size:12px; font-weight:bold;">封面</span>
    <button onclick="showNewEntryModal()">✏️新增</button>
    <button onclick="exportPDF()">📄PDF</button>
    <button onclick="showDeleteAllModal()" style="color:#e53935;">🗑️全部刪除</button>
    <button onclick="nextPage()">➡️</button>
  </div>

  <div id="passwordModal" class="entry-modal">
    <div class="modal-content" style="max-width: 300px; text-align: center;">
      <h3>通關密語</h3>
      <input type="password" id="passwordInput" style="width:100%; padding:10px; margin: 15px 0; text-align:center; border-radius:10px; border:1px solid #ddd;">
      <button onclick="checkPassword()" style="background:#4CAF50; color:white; padding:8px 25px; border:none; border-radius:20px; font-weight:bold;">確認</button>
    </div>
  </div>

  <div id="entryModal" class="entry-modal">
    <div class="modal-content">
      <h3 id="modalTitle">撰寫日記</h3>
      <div class="mood-selector">
        <span class="mood-icon" onclick="selectMood(0)">😊</span>
        <span class="mood-icon" onclick="selectMood(1)">😍</span>
        <span class="mood-icon" onclick="selectMood(2)">😆</span>
        <span class="mood-icon" onclick="selectMood(3)">😢</span>
        <span class="mood-icon" onclick="selectMood(4)">😫</span>
      </div>
      <input id="modalDate" type="date" style="width:150px; padding:8px; margin-top:10px; border-radius:8px; border:1px solid #ddd;">
      <textarea id="modalEntry" placeholder="今天心情如何？"></textarea>
      <div style="margin-top:10px; display:flex; align-items:center; gap:10px; justify-content:flex-end;">
        <div id="previewBox" style="width:50px; height:50px; border:1px dashed #ccc; border-radius:5px; overflow:hidden;">
          <img id="previewImg" style="width:100%; height:100%; object-fit:cover; display:none;">
        </div>
        <button onclick="document.getElementById('photoInput').click()" style="font-size:12px;">📷選照片</button>
        <input type="file" id="photoInput" accept="image/*" style="display:none;" onchange="handleImage(event)">
      </div>
      <div style="text-align:center; margin-top:20px;">
        <button onclick="cancelEdit()" style="padding:8px 20px; border-radius:15px; border:1px solid #ccc; margin-right:10px;">取消</button>
        <button onclick="saveEntry()" style="background:#4CAF50; color:white; padding:8px 20px; border:none; border-radius:15px; font-weight:bold;">儲存</button>
      </div>
    </div>
  </div>

  <!-- 全部刪除確認視窗 -->
  <div id="deleteAllModal" class="entry-modal">
    <div class="delete-modal-content">
      <h3>請確認本月日記已備份完成</h3>
      <div class="delete-modal-btns">
        <button class="btn-cancel-delete" onclick="closeDeleteAllModal()">還沒好</button>
        <button class="btn-confirm-delete" onclick="deleteAllEntries()">備份完了，全部刪除</button>
      </div>
    </div>
  </div>

  <div id="privacy-mask">
    <p>加密處理中</p>
    <p style="margin-top:20px; font-size:12px;">正在生成受保護的 PDF 檔案...</p>
  </div>

  <script>
    const STORAGE_KEY = 'handbookEntries';
    const MOODS = ['😊', '😍', '😆', '😢', '😫'];
    const DIARY_PASSWORD = '8519';

    let entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let currentPage = 0, viewMode = 'cover', editingIndex = -1, currentImgBase64 = "", currentMoodIdx = -1, isAuthenticated = false, isFlipping = false;

    function renderPage(){
      const left = document.getElementById('leftPage'), right = document.getElementById('rightPage');
      if (viewMode === 'cover'){
        left.className = 'page left cover';
        left.innerHTML = `<h1>陳小妤的日記本</h1><p style="margin-top:20px; font-size:12px;">點擊右箭頭開始</p>`;
        right.style.display = 'none';
      } else {
        left.className = 'page left';
        left.innerHTML = getPageHtml(currentPage);
        if (window.innerWidth <= 768) {
          right.style.display = 'none';
        } else {
          right.style.display = 'block';
          right.innerHTML = getPageHtml(currentPage + 1);
        }
      }
      updateCounter();
    }

    function updateCounter() {
      const c = document.getElementById('pageCounter');
      if (viewMode === 'cover') c.textContent = '封面';
      else c.textContent = `${currentPage + 1} / ${entries.length || 1}`;
    }

    function getPageHtml(idx, hideActions = false) {
      if (idx < 0 || idx >= entries.length) return `<div style="text-align:center; padding-top:100px; color:#ccc;">空白頁</div>`;
      const item = entries[idx];
      const mood = item.mood !== undefined && item.mood !== -1 ? MOODS[item.mood] : '';
      const imgHtml = item.image ? `<img src="${item.image}" style="max-width:100%; border-radius:8px; margin-top:10px;">` : '';
      const actions = hideActions ? '' : `<div class="entry-actions"><button onclick="editEntry(${idx})">編輯</button><button class="delete" onclick="deleteEntry(${idx})">刪除</button></div>`;
      return `${actions}<div class="page-header"><span>${item.date.replaceAll('-','/')}</span><span>${mood}</span></div><div style="padding-top:4px; white-space:pre-wrap;">${item.text}</div>${imgHtml}`;
    }

    function flipTo(targetIdx) {
      if(isFlipping) return;
      isFlipping = true;
      const sheet = document.getElementById('flipSheet');
      const front = document.getElementById('flipFront'), back = document.getElementById('flipBack');
      front.innerHTML = getPageHtml(currentPage, true);
      back.innerHTML = getPageHtml(targetIdx, true);
      sheet.style.display = 'block';
      sheet.classList.add('rtl', 'turn');
      setTimeout(() => {
        sheet.classList.remove('turn'); sheet.style.display = 'none';
        currentPage = targetIdx; renderPage(); isFlipping = false;
      }, 800);
    }

    function checkPassword(){
      if(document.getElementById('passwordInput').value === DIARY_PASSWORD){
        isAuthenticated = true;
        document.getElementById('passwordModal').style.display = 'none';
        viewMode = 'content'; currentPage = 0; renderPage();
      } else { alert("密碼錯誤！"); }
    }

    function nextPage(){
      if(viewMode === 'cover') {
        if(!isAuthenticated) { document.getElementById('passwordModal').style.display='flex'; return; }
        viewMode = 'content'; renderPage(); return;
      }
      const step = window.innerWidth <= 768 ? 1 : 2;
      if(currentPage + step < entries.length) flipTo(currentPage + step);
    }

    function prevPage(){
      if(viewMode === 'cover') return;
      const step = window.innerWidth <= 768 ? 1 : 2;
      if(currentPage - step >= 0) flipTo(currentPage - step);
      else { viewMode = 'cover'; renderPage(); }
    }

    function showNewEntryModal(){
      if (!isAuthenticated && viewMode === 'cover') { document.getElementById('passwordModal').style.display = 'flex'; return; }
      editingIndex = -1; currentImgBase64 = ""; currentMoodIdx = -1;
      document.getElementById('modalTitle').textContent = '撰寫日記';
      document.getElementById('modalEntry').value = '';
      document.getElementById('modalDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('previewImg').style.display = 'none';
      document.querySelectorAll('.mood-icon').forEach(e => e.classList.remove('selected'));
      document.getElementById('entryModal').style.display = 'flex';
    }

    function selectMood(idx){ currentMoodIdx = idx; document.querySelectorAll('.mood-icon').forEach((e, i) => e.classList.toggle('selected', i === idx)); }

    function handleImage(e){
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const maxW = 800, maxH = 800;
          let w = img.width, h = img.height;
          if (w > maxW || h > maxH) {
            if (w > h) { h = (h / w) * maxW; w = maxW; }
            else { w = (w / h) * maxH; h = maxH; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          currentImgBase64 = canvas.toDataURL('image/jpeg', 0.8);
          const preview = document.getElementById('previewImg');
          preview.src = currentImgBase64;
          preview.style.display = 'block';
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    function saveEntry(){
      const text = document.getElementById('modalEntry').value, date = document.getElementById('modalDate').value;
      if(!text) return;
      const data = { text, date, image: currentImgBase64, mood: currentMoodIdx };
      if (editingIndex === -1) entries.push(data);
      else entries[editingIndex] = data;
      entries.sort((a, b) => new Date(a.date) - new Date(b.date));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      document.getElementById('entryModal').style.display = 'none';
      if (viewMode === 'cover') viewMode = 'content';
      currentPage = 0; renderPage();
    }

    function cancelEdit(){ document.getElementById('entryModal').style.display = 'none'; }

    function editEntry(idx){
      editingIndex = idx;
      const item = entries[idx];
      document.getElementById('modalTitle').textContent = '編輯日記';
      document.getElementById('modalEntry').value = item.text;
      document.getElementById('modalDate').value = item.date;
      currentImgBase64 = item.image || "";
      currentMoodIdx = item.mood !== undefined ? item.mood : -1;
      const preview = document.getElementById('previewImg');
      if (currentImgBase64) { preview.src = currentImgBase64; preview.style.display = 'block'; }
      else preview.style.display = 'none';
      document.querySelectorAll('.mood-icon').forEach((e, i) => e.classList.toggle('selected', i === currentMoodIdx));
      document.getElementById('entryModal').style.display = 'flex';
    }

    function deleteEntry(idx){
      if(!confirm('確定刪除這篇日記？')) return;
      entries.splice(idx, 1);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      if(currentPage >= entries.length) currentPage = Math.max(0, entries.length - 1);
      renderPage();
    }

    function showDeleteAllModal() {
      document.getElementById('deleteAllModal').style.display = 'flex';
    }

    function closeDeleteAllModal() {
      document.getElementById('deleteAllModal').style.display = 'none';
    }

    function deleteAllEntries() {
      localStorage.removeItem(STORAGE_KEY);
      entries = [];
      currentPage = 0;
      viewMode = 'cover';
      document.getElementById('deleteAllModal').style.display = 'none';
      renderPage();
    }

    function waitTwoFrames() {
      return new Promise(resolve => {
        requestAnimationFrame(() => requestAnimationFrame(resolve));
      });
    }

    async function exportPDF() {
      if (!isAuthenticated) { alert("請先解鎖日記本"); return; }
      if (!entries.length) { alert("沒有日記可以匯出"); return; }

      const mask = document.getElementById('privacy-mask');
      mask.style.display = 'flex';

      await waitTwoFrames();

      const container = document.createElement('div');
      container.id = 'pdf-hidden-area';
      container.style.cssText = 'position:fixed; top:-99999px; left:0; width:800px; opacity:0; pointer-events:none;';
      document.body.appendChild(container);

      entries.forEach((item, idx) => {
        const pageDiv = document.createElement('div');
        pageDiv.className = 'pdf-page';
        pageDiv.style.cssText = 'width:800px; padding:60px; box-sizing:border-box; background:white; font-family:Georgia,"Microsoft JhengHei",serif; font-size:16px; line-height:28px; color:#333; page-break-after:always; min-height:1000px;';

        const mood = item.mood !== undefined && item.mood !== -1 ? MOODS[item.mood] : '';
        const header = `<div style="display:flex; justify-content:space-between; margin-bottom:20px; font-size:14px; color:#999;"><span>${item.date.replaceAll('-','/')}</span><span>${mood}</span></div>`;
        const textContent = `<div style="white-space:pre-wrap; margin-bottom:20px;">${item.text}</div>`;
        const imgHtml = item.image ? `<img src="${item.image}" style="max-width:100%; border-radius:8px; display:block; margin-top:10px;">` : '';

        pageDiv.innerHTML = header + textContent + imgHtml;
        container.appendChild(pageDiv);
      });

      await waitTwoFrames();

      await Promise.all(Array.from(container.querySelectorAll('img')).map(imgEl => new Promise(resolve => {
        if (imgEl.complete) resolve();
        imgEl.onload = () => resolve();
        imgEl.onerror = () => resolve();
      })));

      await waitTwoFrames();

      try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
          unit: 'mm',
          format: 'a4',
          orientation: 'portrait',
          encryption: { userPassword: DIARY_PASSWORD, ownerPassword: DIARY_PASSWORD }
        });

        const pageW = pdf.internal.pageSize.getWidth();
        const pageH = pdf.internal.pageSize.getHeight();
        const margin = 10;
        const contentW = pageW - margin * 2;
        const contentH = pageH - margin * 2;

        const pages = Array.from(container.querySelectorAll('.pdf-page'));

        for (let i = 0; i < pages.length; i++) {
          const el = pages[i];

          const canvas = await window.html2canvas(el, {
            scale: 2,
            useCORS: true,
            backgroundColor: '#ffffff',
            windowWidth: 800,
            onclone: (clonedDoc) => {
              const c = clonedDoc.getElementById('pdf-hidden-area');
              if (c) c.style.opacity = '1';
              const m = clonedDoc.getElementById('privacy-mask');
              if (m) m.style.display = 'none';
            }
          });

          const imgData = canvas.toDataURL('image/jpeg', 0.95);

          let drawW = contentW;
          let drawH = (canvas.height * drawW) / canvas.width;

          if (drawH > contentH) {
            drawH = contentH;
            drawW = (canvas.width * drawH) / canvas.height;
          }

          const x = margin + (contentW - drawW) / 2;
          const y = margin;

          if (i > 0) pdf.addPage();
          pdf.addImage(imgData, 'JPEG', x, y, drawW, drawH);
        }

        pdf.save('My-Diary.pdf');
      } catch (err) {
        console.error(err);
        alert("匯出失敗，請再試一次");
      } finally {
        mask.style.display = "none";
        container.innerHTML = "";
      }
    }

    window.onload = renderPage;
  </script>
</body>
</html>
